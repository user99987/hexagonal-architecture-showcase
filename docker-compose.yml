# Full containerized stack for the e-commerce showcase: the application itself plus
# Postgres, RabbitMQ, Keycloak and the observability stack (Prometheus/Tempo/Grafana),
# all sharing one Docker network.
#
# Start with:   docker compose up -d --build
# Stop with:    docker compose down
#
# The app is reachable at http://localhost:9080/home (Swagger UI at /home/swagger-ui.html),
# actuator at http://localhost:9081/actuator, Keycloak admin console at http://localhost:8081,
# Grafana at http://localhost:3000 (admin/admin, anonymous access enabled).
#
# For infra-only setups (running the app from an IDE instead), see the standalone compose
# files under etc/docker/{postgres,rabbitmq,keycloak,observability} - those use
# host.docker.internal to reach the app running on the host rather than in this network.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-app
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "9080:9080"
      - "9081:9081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started
      tempo:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sa
      - POSTGRES_PASSWORD=sa
      - POSTGRES_DB=test_db
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sa -d test_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecommerce-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=sa
      - RABBITMQ_DEFAULT_PASS=sa
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: ecommerce-keycloak
    restart: unless-stopped
    command: [ "start-dev", "--import-realm" ]
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./etc/docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8081:8080"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ecommerce-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./etc/docker/observability/prometheus/prometheus-docker.yml:/etc/prometheus/prometheus.yml:ro

  tempo:
    image: grafana/tempo:2.6.1
    container_name: ecommerce-tempo
    restart: unless-stopped
    command: [ "-config.file=/etc/tempo.yaml" ]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./etc/docker/observability/tempo/tempo.yaml:/etc/tempo.yaml:ro

  grafana:
    image: grafana/grafana:11.3.1
    container_name: ecommerce-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./etc/docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./etc/docker/observability/grafana/dashboards:/etc/grafana/provisioning/dashboards/files:ro
    depends_on:
      - prometheus
      - tempo

  # ---- AWS LocalStack stack (opt-in: docker compose --profile aws up) ----
  #
  # Start with: docker compose --profile aws up -d localstack
  #             docker compose --profile aws up terraform
  #
  # When these services run they share the same Docker network as the rest of the stack,
  # so inter-container traffic uses service names (http://localstack:4566).
  # The Spring Boot app running on the HOST (./gradlew bootRun) reaches LocalStack via
  # the published port: http://localhost:4566 - the same dual-endpoint pattern used by
  # Keycloak above (issuer-uri uses localhost:8081, jwk-set-uri uses keycloak:8080).

  localstack:
    image: localstack/localstack:3.8
    container_name: ecommerce-localstack
    profiles: ["aws"]
    environment:
      - SERVICES=s3,sqs,secretsmanager
      - DEBUG=0
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\"'"]
      interval: 5s
      timeout: 5s
      retries: 20

  terraform:
    image: hashicorp/terraform:1.9
    container_name: ecommerce-terraform
    profiles: ["aws"]
    depends_on:
      localstack:
        condition: service_healthy
    # Mount read-write so Terraform can write .terraform/ and state files.
    # State files and the .terraform lock file are git-ignored (see .gitignore).
    volumes:
      - ./etc/terraform:/workspace
    working_dir: /workspace
    environment:
      # Container-to-container endpoint: Terraform runs inside Docker, so it reaches
      # LocalStack via the service name on port 4566, NOT via localhost.
      # (The Terraform provider's default localstack_endpoint variable is overridden here.)
      - TF_VAR_localstack_endpoint=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: ["sh", "-c", "terraform init && terraform apply -auto-approve"]
