management:
  user:
    name: admin
    password: 'admin'
  health:
    rabbit:
      enabled: false
spring:
  autoconfigure:
    exclude: org.springdoc.core.configuration.SpringDocHateoasConfiguration
  liquibase:
    enabled: false
  jpa:
    database: H2
    database-platform: org.hibernate.dialect.H2Dialect
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/ecommerce
          jwk-set-uri: http://localhost:8081/realms/ecommerce/protocol/openid-connect/certs
  mail:
    default-encoding: UTF-8
    host: localhost
    username: test
    password: secret
    port: 3025
    debug: false
    template:
      order-confirmation: order-confirmation-attachment.fo.ftl
      order-customer: order-confirmation.ftl.txt
      pdf-path: pdf
      email-path: email
    properties:
      mail:
        smtp:
          debug: false
          auth: true
          starttls:
            enable: true
    transport:
      protocol: smtp
    test-connection: false
  main:
    allow-bean-definition-overriding: true

service:
  rabbitmq:
    enabled: false
  mail:
    enabled: false
