management:
  server:
    port: 9081
  user:
    name: admin
    password: 'admin'
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
  endpoints:
    web:
      exposure:
        include: '*'
  influx:
    metrics:
      export:
        enabled: false
  prometheus:
    metrics:
      export:
        enabled: true
  httpexchanges:
    recording:
      enabled: false

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${security.oauth2.issuer-uri:http://localhost:8081/realms/ecommerce}
          jwk-set-uri: ${security.oauth2.jwk-set-uri:http://localhost:8081/realms/ecommerce/protocol/openid-connect/certs}
