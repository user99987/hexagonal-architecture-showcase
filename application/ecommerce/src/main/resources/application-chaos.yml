# Overrides RabbitMQ connection details to route through the Toxiproxy proxy instead of talking
# to RabbitMQ directly - see etc/docker/chaos/toxiproxy.json and the "Chaos testing" section of the
# root README for how this is used to demonstrate the Resilience4j circuit breaker opening.
#
# Activate together with the "docker" profile: SPRING_PROFILES_ACTIVE=docker,chaos
spring:
  rabbitmq:
    host: toxiproxy
    port: 25672
