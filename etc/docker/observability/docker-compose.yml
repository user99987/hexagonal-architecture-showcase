# Local observability stack for the e-commerce showcase application.
# Start with: docker compose -f etc/docker/observability/docker-compose.yml up -d
# Prometheus scrapes the app's /actuator/prometheus endpoint on the management port (9081).
# The app exports traces via OTLP/HTTP to Tempo on port 4318 (see application-security.yml).
# Grafana (http://localhost:3000, admin/admin) comes pre-provisioned with both datasources
# and a starter "Ecommerce Showcase - Overview" dashboard.
services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ecommerce-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    container_name: ecommerce-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    container_name: ecommerce-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards/files:ro
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped
