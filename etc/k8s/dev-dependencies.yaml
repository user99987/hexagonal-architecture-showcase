# Minimal, dev-only Kubernetes manifests for the ecommerce chart's dependencies (Postgres,
# RabbitMQ, Keycloak), matching the credentials/images used by the root docker-compose.yml.
# Intended for a local kind/k3d cluster to try out the Helm chart end-to-end - NOT meant for
# production (no persistent volumes, no resource limits, single replica, plaintext secrets).
#
# Apply with: kubectl apply -f etc/k8s/dev-dependencies.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-postgres
  labels: { app: ecommerce-postgres }
spec:
  replicas: 1
  selector:
    matchLabels: { app: ecommerce-postgres }
  template:
    metadata:
      labels: { app: ecommerce-postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER, value: "sa" }
            - { name: POSTGRES_PASSWORD, value: "sa" }
            - { name: POSTGRES_DB, value: "test_db" }
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "sa", "-d", "test_db"]
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-postgres
spec:
  selector: { app: ecommerce-postgres }
  ports:
    - { port: 5432, targetPort: 5432 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-rabbitmq
  labels: { app: ecommerce-rabbitmq }
spec:
  replicas: 1
  selector:
    matchLabels: { app: ecommerce-rabbitmq }
  template:
    metadata:
      labels: { app: ecommerce-rabbitmq }
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          ports:
            - { containerPort: 5672 }
            - { containerPort: 15672 }
          env:
            - { name: RABBITMQ_DEFAULT_USER, value: "sa" }
            - { name: RABBITMQ_DEFAULT_PASS, value: "sa" }
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-rabbitmq
spec:
  selector: { app: ecommerce-rabbitmq }
  ports:
    - { name: amqp, port: 5672, targetPort: 5672 }
    - { name: management, port: 15672, targetPort: 15672 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-keycloak
  labels: { app: ecommerce-keycloak }
spec:
  replicas: 1
  selector:
    matchLabels: { app: ecommerce-keycloak }
  template:
    metadata:
      labels: { app: ecommerce-keycloak }
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0
          args: ["start-dev", "--import-realm"]
          ports: [{ containerPort: 8080 }]
          env:
            - { name: KEYCLOAK_ADMIN, value: "admin" }
            - { name: KEYCLOAK_ADMIN_PASSWORD, value: "admin" }
          volumeMounts:
            - name: realm-export
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm-export
          # Created separately from the existing realm export file, see etc/k8s/README.md:
          #   kubectl create configmap ecommerce-keycloak-realm \
          #     --from-file=realm-export.json=etc/docker/keycloak/realm-export.json
          configMap:
            name: ecommerce-keycloak-realm
            items:
              - key: realm-export.json
                path: realm-export.json
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-keycloak
spec:
  selector: { app: ecommerce-keycloak }
  ports:
    - { port: 8080, targetPort: 8080 }
