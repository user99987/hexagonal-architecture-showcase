# Default values for the ecommerce Helm chart.

replicaCount: 1

image:
  # Build locally with `docker build -t ecommerce-showcase:local .` (repo root Dockerfile) and
  # load it into your cluster (e.g. `kind load docker-image ecommerce-showcase:local`), or push
  # to a registry and set repository/tag accordingly.
  repository: ecommerce-showcase
  tag: local
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: "ecommerce"

# Spring profile(s) activated in-cluster. "k8s" resolves Postgres/RabbitMQ/Keycloak/Tempo hostnames
# from the env vars below, defaulting to in-cluster Service DNS names matching this chart's
# releaseName-based conventions (see application-k8s.yml).
springProfilesActive: "k8s"

service:
  type: ClusterIP
  appPort: 9080
  managementPort: 9081

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ecommerce.local
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

probes:
  startup:
    path: /actuator/health
    port: 9081
    failureThreshold: 30
    periodSeconds: 5
  liveness:
    path: /actuator/health
    port: 9081
    periodSeconds: 10
  readiness:
    path: /actuator/health
    port: 9081
    periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

# Connection details for dependent services. Defaults assume Postgres/RabbitMQ/Keycloak/Tempo are
# deployed as their own Services in the same namespace, named as below (bring your own manifests,
# a Bitnami chart, or reuse an external managed instance by overriding the host/port values).
env:
  dbHost: ecommerce-postgres
  dbPort: "5432"
  dbName: test_db
  dbUsername: sa
  # For a real deployment, put this in a Secret instead (see secret.yaml) and reference it via
  # extraEnvFrom, rather than plain values.yaml.
  dbPassword: sa

  rabbitmqHost: ecommerce-rabbitmq
  rabbitmqPort: "5672"
  rabbitmqUsername: sa
  rabbitmqPassword: sa

  oauth2IssuerUri: http://localhost:8081/realms/ecommerce
  oauth2JwkSetUri: http://ecommerce-keycloak:8080/realms/ecommerce/protocol/openid-connect/certs

  otlpTracingEndpoint: http://ecommerce-tempo:4318/v1/traces

# Extra environment variables/secret references merged in as-is (list of EnvVar objects).
extraEnv: []

serviceAccount:
  create: true
  name: ""
  annotations: {}
